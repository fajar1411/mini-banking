application.name=banking
server.port=8090
server.servlet.context-path=/api/v1/${application.name}
app.version=0.0.1

spring.profiles.active=${SERVICE_PROFILE:dev}
spring.application.name=${application.name}-service

spring.datasource.url=jdbc:mysql://localhost:3306/banking
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.pool-name=${spring.application.name}-pool


server.error.include-message=always
server.error.include-stacktrace=always
server.error.include-binding-errors=always
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.jackson.serialization.FAIL_ON_EMPTY_BEANS=false


